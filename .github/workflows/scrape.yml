name: Scrape Contabo Pricing

on:
  schedule:
    - cron: '0 6 * * *'    # 06:00 UTC daily
    - cron: '0 18 * * *'   # 18:00 UTC daily
  workflow_dispatch:
    inputs:
      plans:
        description: 'Comma-separated plan slugs (blank = all active)'
        required: false
        default: ''
      concurrency:
        description: 'Parallel fetches 1-16 (overrides SCRAPER_CONCURRENCY)'
        required: false
        default: ''

# Prevent overlapping scheduled + manual runs; cancel in-progress if newer starts
concurrency:
  group: scrape
  cancel-in-progress: true

# Defaults — override without editing YAML via:
#   GitHub Settings → Secrets and variables → Variables (repo-level)
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  SCRAPER_CONCURRENCY: ${{ vars.SCRAPER_CONCURRENCY || '8' }}
  SCRAPER_RETRIES:     ${{ vars.SCRAPER_RETRIES     || '3' }}
  BINARY_VERSION:      ${{ vars.BINARY_VERSION       || 'latest' }}
  OUTPUT_DIR:          'data/output'

permissions:
  contents: write
  issues: write

jobs:
  scrape:
    name: Scrape & publish
    runs-on: [self-hosted, Linux, X64]

    steps:
      - uses: actions/checkout@v4

      # Resolve "latest" → concrete tag so cache key is stable across runs
      - name: Resolve binary version
        id: ver
        run: |
          if [ "$BINARY_VERSION" = "latest" ]; then
            TAG=$(gh release view --json tagName -q '.tagName')
          else
            TAG="$BINARY_VERSION"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Cache keyed by release tag — re-download only when a new release ships
      - name: Cache scraper binary
        id: cache
        uses: actions/cache@v4
        with:
          path: bin/contabo-scraper
          key: binary-${{ steps.ver.outputs.tag }}-linux-x86_64

      - name: Download binary
        if: steps.cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p bin
          gh release download "${{ steps.ver.outputs.tag }}" \
            --pattern 'contabo-scraper-linux-x86_64' \
            --output bin/contabo-scraper
          chmod +x bin/contabo-scraper
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Discover plan URLs
        id: discover
        run: node .github/scripts/discover_plans.js

      - name: Run scraper
        id: scrape
        continue-on-error: true
        run: |
          CONCURRENCY="${{ github.event.inputs.concurrency || env.SCRAPER_CONCURRENCY }}"
          EXTRA_ARGS=""
          if [ -n "${{ github.event.inputs.plans }}" ]; then
            EXTRA_ARGS="--plans ${{ github.event.inputs.plans }}"
          fi
          mkdir -p "$OUTPUT_DIR"
          bin/contabo-scraper \
            --output          "$OUTPUT_DIR" \
            --concurrency     "$CONCURRENCY" \
            --retries         "$SCRAPER_RETRIES" \
            --json            \
            --plan-urls-file  data/plan_urls.json \
            $EXTRA_ARGS

      - name: Enrich output
        run: node .github/scripts/enrich_output.js

      - name: Generate PRICES.md
        run: node .github/scripts/generate_report.js

      - name: Audit and alert
        run: |
          node .github/scripts/post_scrape_audit.js \
            --gap-report          "$OUTPUT_DIR/contabo_gap_report.json" \
            --discovery-changed   "${{ steps.discover.outputs.changed }}" \
            --discovery-blocked   "${{ steps.discover.outputs.discovery_blocked }}" \
            --added               "${{ steps.discover.outputs.added }}" \
            --removed             "${{ steps.discover.outputs.removed }}" \
            --renamed             "${{ steps.discover.outputs.renamed }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit & push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f "$OUTPUT_DIR"   # -f bypasses data/output/ in .gitignore
          git add PRICES.md
          git add data/plan_urls.json
          if git diff --cached --quiet; then
            echo "No changes — skipping commit"
          else
            MSG="data: scrape $(date -u '+%Y-%m-%d %H:%M UTC')"
            if [ "${{ steps.discover.outputs.changed }}" = "true" ]; then
              MSG="$MSG [catalog: +${{ steps.discover.outputs.added }} -${{ steps.discover.outputs.removed }}]"
            fi
            git commit -m "$MSG"
            git push
          fi
